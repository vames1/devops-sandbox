# DevOps Sandbox Platform - Main Nginx Config
events {
    worker_connections 1024;
}

http {
    # Logging format
    log_format sandbox '$time_iso8601 | $status | ${request_time}s | $upstream_addr | $request | env=$http_x_env_id';
    access_log /var/log/nginx/access.log sandbox;
    error_log /var/log/nginx/error.log warn;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    server {
        listen 80;
        server_name _;

        # Default route
        location / {
            return 200 '{"service":"DevOps Sandbox Platform","status":"running","message":"Use /ENV_ID/ to access environments"}';
            add_header Content-Type application/json;
        }

        # Health check for platform itself
        location /platform/health {
            return 200 '{"status":"ok","service":"sandbox-platform"}';
            add_header Content-Type application/json;
        }

        # Include all per-environment configs
        include /etc/nginx/conf.d/*.conf;
    }
}
